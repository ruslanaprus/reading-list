spring.application.name=ai-practice
spring.config.import=optional:file:.env[.properties]

chat.model=gemini
#chat.model=ollama

spring.ai.google.genai.project-id=reading-list-450715
spring.ai.google.genai.credentials-uri=file:${GEMINI-API-KEY}
spring.ai.google.genai.location=europe-west4
spring.ai.google.genai.chat.options.model=gemini-2.0-flash

spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=llama3.2:latest

books.api.key=${BOOKS-API-KEY}
#books.provider=google
#books.provider=openLibrary
books.provider=wikiBooks
